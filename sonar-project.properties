sonar.projectKey=react-nodejs-postgress-application
sonar.organization=mmshafiqul

sonar.projectName=React NodeJS PostgreSQL Application
sonar.projectVersion=1.0

# Source code
sonar.sources=backend,frontend/src

# Tests
sonar.tests=backend,frontend
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.git/**
sonar.coverage.exclusions=**/node_modules/**,**/dist/**,**/build/**

# Coverage (IMPORTANT FIX)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
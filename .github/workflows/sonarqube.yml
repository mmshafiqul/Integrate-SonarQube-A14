name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Download and install SonarQube Scanner
        run: |
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-6.2.1.4610-linux.zip
          unzip -q sonar-scanner-cli-6.2.1.4610-linux.zip
          export PATH=$PWD/sonar-scanner-6.2.1.4610-linux/bin:$PATH
          echo "$PWD/sonar-scanner-6.2.1.4610-linux/bin" >> $GITHUB_PATH
      
      - name: Run SonarQube Scanner
        run: |
          sonar-scanner \
            -Dsonar.projectKey=react-nodejs-postgress-application \
            -Dsonar.projectName=React NodeJS PostgreSQL Application \
            -Dsonar.sources=backend,frontend/src \
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.git/** \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}

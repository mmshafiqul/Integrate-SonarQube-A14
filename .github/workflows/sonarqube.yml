name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install backend dependencies
        run: |
          cd backend
          npm ci
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run SonarQube Scanner with Docker
        run: |
          docker run --rm \
            -e SONAR_TOKEN=${{ secrets.SONAR_TOKEN }} \
            -e SONAR_HOST_URL=https://sonarcloud.io \
            -v $PWD:/usr/src \
            sonarsource/sonar-scanner-cli:5.0.1.3006 \
            -Dsonar.projectKey=react-nodejs-postgress-application \
            -Dsonar.projectName=React NodeJS PostgreSQL Application \
            -Dsonar.sources=backend,frontend/src \
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.git/** \
            -Dsonar.sourceEncoding=UTF-8 \
            -Dsonar.organization=mmshafiqul
